name: Build and Deploy to Azure (Staging)


# TODO: trigger on version tags (v*) instead of direct push to main for PROD releases
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/go-webpage-analyzer:latest
            ${{ vars.ACR_LOGIN_SERVER }}/go-webpage-analyzer:${{ github.sha }}
          
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: gowebpageanalyzer
          containerAppName: go-webpage-analyzer
          resourceGroup: go-webpage-analyzer-rg
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/go-webpage-analyzer:latest
