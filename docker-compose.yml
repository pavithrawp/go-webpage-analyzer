version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-webpage-analyzer
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - PPROF_USERNAME=${PPROF_USERNAME:-admin}
      - PPROF_PASSWORD=${PPROF_PASSWORD:-secret}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s