<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .mono { font-family: 'DM Mono', monospace; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid #e5e7eb;
            border-top-color: #111827;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    
    <header class="bg-white border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-6 py-5 flex items-center gap-3">
            <div class="w-8 h-8 bg-gray-900 rounded-lg flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <span class="font-semibold text-gray-900 text-lg tracking-tight">Webpage Analyzer</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">

        <div class="mb-10">
            <h1 class="text-3xl font-semibold text-gray-900 mb-2 tracking-tight">Analyze any webpage</h1>
            <p class="text-gray-500 text-base">Enter a URL to extract structure, links, headings, and more.</p>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-8">
            <div class="flex gap-3">
                <input
                    id="urlInput"
                    type="text"
                    placeholder="https://example.com"
                    class="mono flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
                />
                <button
                    id="analyzeBtn"
                    onclick="analyze()"
                    class="px-6 py-3 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-700 transition flex items-center gap-2 disabled:opacity-50"
                >
                    <span id="btnText">Analyze</span>
                    <div id="spinner" class="spinner hidden"></div>
                </button>
            </div>

            <div id="errorBox" class="hidden mt-4 p-4 bg-red-50 border border-red-100 rounded-xl">
                <p class="text-sm text-red-600 mono" id="errorText"></p>
            </div>
        </div>

        <div id="results" class="hidden fade-in">

            <!-- HTML Version + Title -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-2">HTML Version</p>
                    <p class="text-2xl font-semibold text-gray-900 mono" id="htmlVersion">—</p>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-2">Page Title</p>
                    <p class="text-lg font-medium text-gray-900 truncate" id="pageTitle">—</p>
                </div>
            </div>

            <!-- Links -->
            <div class="grid grid-cols-3 gap-4 mb-4">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-2">Internal Links</p>
                    <p class="text-3xl font-semibold text-gray-900 mono" id="internalLinks">—</p>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-2">External Links</p>
                    <p class="text-3xl font-semibold text-gray-900 mono" id="externalLinks">—</p>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-2">Inaccessible</p>
                    <p class="text-3xl font-semibold mono" id="inaccessibleLinks">—</p>
                </div>
            </div>

            <!-- Headings + Login Form -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-4">Headings</p>
                    <div id="headings" class="space-y-2"></div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-4">Login Form</p>
                    <div id="loginForm" class="flex items-center gap-3 mt-2"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        async function analyze() {
            const url = document.getElementById('urlInput').value.trim()
            const btn = document.getElementById('analyzeBtn')
            const spinner = document.getElementById('spinner')
            const btnText = document.getElementById('btnText')
            const errorBox = document.getElementById('errorBox')
            const results = document.getElementById('results')

            if (!url) return

            btn.disabled = true
            spinner.classList.remove('hidden')
            btnText.textContent = 'Analyzing'
            errorBox.classList.add('hidden')
            results.classList.add('hidden')

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                })

                const data = await res.json()

                if (!res.ok) {
                    showError(data.error || 'Something went wrong')
                    return
                }

                showResults(data)

            } catch (err) {
                showError('Failed to connect to the server')
            } finally {
                btn.disabled = false
                spinner.classList.add('hidden')
                btnText.textContent = 'Analyze'
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox')
            const errorText = document.getElementById('errorText')
            errorText.textContent = message
            errorBox.classList.remove('hidden')
        }

        function showResults(data) {
            // html version
            document.getElementById('htmlVersion').textContent = data.html_version || '—'

            // title
            document.getElementById('pageTitle').textContent = data.title || 'No title'

            // links
            document.getElementById('internalLinks').textContent = data.internal_links ?? 0
            document.getElementById('externalLinks').textContent = data.external_links ?? 0

            const inaccessible = document.getElementById('inaccessibleLinks')
            inaccessible.textContent = data.inaccessible_links ?? 0
            inaccessible.className = `text-3xl font-semibold mono ${data.inaccessible_links > 0 ? 'text-red-500' : 'text-gray-900'}`

            // headings
            const headingsEl = document.getElementById('headings')
            headingsEl.innerHTML = ''
            const headings = data.headings || {}
            const levels = ['h1','h2','h3','h4','h5','h6']
            let hasHeadings = false
            levels.forEach(level => {
                if (headings[level]) {
                    hasHeadings = true
                    headingsEl.innerHTML += `
                        <div class="flex items-center justify-between">
                            <span class="mono text-sm font-medium text-gray-500 uppercase">${level}</span>
                            <span class="mono text-sm font-semibold text-gray-900 bg-gray-50 px-3 py-1 rounded-lg">${headings[level]}</span>
                        </div>`
                }
            })
            if (!hasHeadings) {
                headingsEl.innerHTML = '<p class="text-sm text-gray-400">No headings found</p>'
            }

            // login form
            const loginEl = document.getElementById('loginForm')
            if (data.has_login_form) {
                loginEl.innerHTML = `
                    <div class="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center">
                        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <span class="text-sm font-medium text-green-600">Login form detected</span>`
            } else {
                loginEl.innerHTML = `
                    <div class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </div>
                    <span class="text-sm font-medium text-gray-400">No login form</span>`
            }

            document.getElementById('results').classList.remove('hidden')
        }

        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') analyze()
        })
    </script>

</body>
</html>
